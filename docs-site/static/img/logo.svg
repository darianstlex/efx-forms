  <circle cx="155" cy="20" r="1.2" fill="#E2E8F0" filter="url(#lightningGlow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="25" r="0.8" fill="#CBD5E0" filter="url(#lightningGlow)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="35" r="0.6" fill="#E2E8F0" filter="url(#lightningGlow)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
  </circle>
  <line x1="20" y1="52" x2="180" y2="52" stroke="url(#chromeGrad)" stroke-width="1" opacity="0.4"/>
