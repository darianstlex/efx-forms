<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="25%" style="stop-color:#718096"/>
      <stop offset="50%" style="stop-color:#CBD5E0"/>
      <stop offset="75%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>
    <filter id="lightningGlow">
      <feGaussianBlur stdDeviation="1.5" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="60" fill="#1A202C" rx="8"/>
  <line x1="0" y1="10" x2="200" y2="10" stroke="#2D3748" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="20" x2="200" y2="20" stroke="#2D3748" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="30" x2="200" y2="30" stroke="#2D3748" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="40" x2="200" y2="40" stroke="#2D3748" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="50" x2="200" y2="50" stroke="#2D3748" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="800" fill="url(#chromeGrad)" stroke="#4A5568" stroke-width="0.5" letter-spacing="2" text-anchor="middle">FXF</text>
  <text x="100" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="800" fill="none" stroke="#CBD5E0" stroke-width="0.3" letter-spacing="2" text-anchor="middle" opacity="0.4">FXF</text>
  <path d="M145 18 L152 28 L148 28 L150 38 L142 30 L146 30 Z" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="0.3" filter="url(#lightningGlow)" opacity="0.95"/>
  <path d="M48 22 L53 28 L50 28 L51 34 L46 29 L49 29 Z" fill="#CBD5E0" stroke="#A0AEC0" stroke-width="0.2" filter="url(#lightningGlow)" opacity="0.7"/>
  <line x1="85" y1="25" x2="85" y2="45" stroke="#CBD5E0" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="25" x2="90" y2="45" stroke="#CBD5E0" stroke-width="0.3" opacity="0.2"/>
  <line x1="110" y1="25" x2="110" y2="45" stroke="#CBD5E0" stroke-width="0.3" opacity="0.2"/>
