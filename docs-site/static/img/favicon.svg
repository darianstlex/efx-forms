<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Chrome/metallic gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="25%" style="stop-color:#718096"/>
      <stop offset="50%" style="stop-color:#CBD5E0"/>
      <stop offset="75%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#2D3748"/>
    </linearGradient>
    
    <!-- Lightning glow -->
    <filter id="lightningGlow">
      <feGaussianBlur stdDeviation="1" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark metallic background -->
  <circle cx="16" cy="16" r="15" fill="#1A202C"/>
  
  <!-- Metallic F with chrome effect -->
  <path d="M10 8 L10 10 L17 10 L17 12 L10 12 L10 24 L8 24 L8 6 L22 6 L22 8 Z" 
        fill="url(#chromeGrad)" 
        stroke="#4A5568" 
        stroke-width="0.5"/>
  
  <!-- Lightning bolt accent -->
  <path d="M18 14 L22 18 L20 18 L21 24 L17 20 L19 20 Z" 
        fill="#E2E8F0" 
        stroke="#CBD5E0"
        stroke-width="0.2"
        filter="url(#lightningGlow)"
        opacity="0.9"/>
  
  <!-- Metallic shine lines -->
  <line x1="12" y1="8" x2="12" y2="24" stroke="#CBD5E0" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="8" x2="14" y2="24" stroke="#CBD5E0" stroke-width="0.3" opacity="0.2"/>
  
  <!-- Electric spark -->
  <circle cx="20" cy="12" r="1" fill="#E2E8F0" filter="url(#lightningGlow)" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="0.7s" repeatCount="indefinite"/>
  </circle>
</svg>
